<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskNotify - Вход</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="workspace">
    <main class="main-content">
      <div class="auth-topbar">
        <div class="auth-title">
          <strong>Авторизация</strong>
          <span>Войдите или зарегистрируйтесь, чтобы перейти к задачам</span>
        </div>
        <div class="auth-actions">
          <a class="btn" href="./index.html">На главную</a>
        </div>
      </div>

      <section id="authPanel" class="auth-panel" aria-label="Форма входа и регистрации">
        <div class="auth-switch">
          <button id="loginTabBtn" class="auth-switch-btn active" type="button">Вход</button>
          <button id="registerTabBtn" class="auth-switch-btn" type="button">Регистрация</button>
        </div>
        <form id="loginForm" class="auth-form">
          <label class="field">
            <span>Имя пользователя</span>
            <input id="loginUsernameInput" type="text" required>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input id="loginPasswordInput" type="password" required>
          </label>
          <button class="btn btn-primary" type="submit">Войти</button>
        </form>
        <form id="registerForm" class="auth-form hidden">
          <label class="field">
            <span>Имя пользователя</span>
            <input id="registerUsernameInput" type="text" required>
          </label>
          <label class="field">
            <span>Email</span>
            <input id="registerEmailInput" type="email" required>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input id="registerPasswordInput" type="password" required>
          </label>
          <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
        </form>
        <p id="authFeedback" class="auth-feedback hidden"></p>
      </section>
    </main>
  </div>

  <script src="./auth.js"></script>
</body>
</html>
