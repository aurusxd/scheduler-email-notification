<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskNotify</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="workspace">
    <main class="main-content">
      <div class="auth-topbar">
        <div class="auth-title">
          <strong>Профиль</strong>
          <span>Авторизуйтесь для работы с задачами</span>
        </div>
        <div class="auth-actions">
          <button class="btn btn-primary" type="button">Вход</button>
          <button class="btn" type="button">Регистрация</button>
        </div>
      </div>

      <section class="dashboard-strip">
        <article class="stat-card">
          <span>Задач сегодня</span>
          <strong id="tasksTodayCount">0</strong>
        </article>
        <article class="stat-card">
          <span>В работе</span>
          <strong id="inProgressCount">0</strong>
        </article>
        <article class="stat-card">
          <span>Просрочено</span>
          <strong id="overdueCount">0</strong>
        </article>
      </section>

      <header class="views-bar">
        <button class="view-tab active" type="button" data-view="all">Все задачи</button>
        <button id="statusViewTab" class="view-tab" type="button" data-view="status">По статусу</button>
      </header>

      <section id="statusFilterPopover" class="status-filter-popover hidden" aria-label="Фильтр задач по статусу">
        <select id="statusViewSelect" class="status-filter-select" size="3" aria-label="Фильтр по статусу">
          <option value="Не начато">Не начато</option>
          <option value="В процессе">В процессе</option>
          <option value="Выполнено">Выполнено</option>
        </select>
      </section>

      <section class="table-wrap">
        <table class="tasks-table">
          <thead>
            <tr>
              <th>Название задачи</th>
              <th>Статус</th>
              <th>Срок</th>
              <th>Приоритет</th>
              <th>Тип задачи</th>
              <th>Описание</th>
            </tr>
          </thead>
          <tbody>
            <tr class="new-task-row">
              <td>
                <div class="inline-name-cell">
                  <input id="taskNameInput" class="table-input" type="text" placeholder="Название задачи">
                  <button class="btn btn-primary btn-inline-add hidden" id="addTaskBtn" type="button">Добавить</button>
                </div>
              </td>
              <td>
                <button id="taskStatusDisplay" class="cell-display" type="button" aria-label="Выбрать статус задачи">Не начато</button>
                <select id="taskStatusInput" class="table-input is-collapsed" aria-label="Статус задачи">
                  <option value="Не начато" selected>Не начато</option>
                  <option value="В процессе">В процессе</option>
                  <option value="Выполнено">Выполнено</option>
                </select>
              </td>
              <td>
                <button id="taskDeadlineTrigger" class="date-trigger hidden" type="button" data-start="" data-end="">Указать дедлайн</button>
              </td>
              <td>
                <select id="taskPriorityInput" class="table-input hidden" aria-label="Приоритет">
                  <option value="Низкий">Низкий</option>
                  <option value="Средний">Средний</option>
                  <option value="Высокий">Высокий</option>
                </select>
              </td>
              <td>
                <button id="taskTypeDisplay" class="cell-display" type="button" aria-label="Указать тип задачи">Указать тип</button>
                <input id="taskTypeInput" class="table-input is-collapsed" type="text" placeholder="Тип задачи">
              </td>
              <td>
                <textarea id="taskDescriptionInput" class="table-input hidden" placeholder="Описание"></textarea>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="date-popover hidden" id="deadlinePopover" aria-label="Deadline picker">
        <h3>Дедлайны задачи</h3>
        <label class="field">
          <span>Начало выполнения</span>
          <input id="startDateInput" type="date">
        </label>
        <label class="field">
          <span>Конец выполнения</span>
          <input id="endDateInput" type="date">
        </label>
        <div class="popover-actions">
          <button class="btn btn-primary" id="saveDatesBtn" type="button">Сохранить</button>
          <button class="btn" id="closePopoverBtn" type="button">Закрыть</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
